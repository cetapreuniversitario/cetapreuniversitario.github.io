<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CETA | Simulador Matemático 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --primary: #2563eb; --sidebar-bg: #0f172a; --sidebar-text: #94a3b8;
      --bg-main: #f8fafc; --card-bg: #ffffff; --text-dark: #1e293b;
      --border: #e2e8f0; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.dark {
      --bg-main: #020617; --card-bg: #1e293b; --text-dark: #f1f5f9;
      --border: #334155; --sidebar-bg: #000000;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); color: var(--text-dark); transition: var(--transition); overflow-x: hidden; }

    /* --- MODAL DE USUARIO --- */
    #user-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 2000; display: flex;
      align-items: center; justify-content: center; backdrop-filter: blur(10px);
    }
    .modal-box {
      background: var(--card-bg); padding: 2.5rem; border-radius: 24px;
      width: 90%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .input-field {
      width: 100%; padding: 12px; border: 2px solid var(--border);
      border-radius: 10px; background: transparent; color: var(--text-dark); font-size: 1rem; margin: 1rem 0;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 280px; background: var(--sidebar-bg); color: white; padding: 1.5rem;
      position: fixed; height: 100vh; overflow-y: auto; z-index: 1001;
      transition: transform 0.3s ease;
    }
    .sidebar-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; margin-bottom: 2rem; color: white; text-decoration: none; }
    
    .nav-link {
      display: flex; align-items: center; gap: 10px; padding: 12px 16px; color: var(--sidebar-text);
      text-decoration: none; border-radius: 10px; font-size: 0.85rem; margin-bottom: 4px; 
      transition: 0.2s; cursor: pointer; border-left: 4px solid transparent;
    }
    .nav-link.active { background: rgba(37, 99, 235, 0.15); color: white; border-left-color: var(--primary); font-weight: 600; }

    /* --- CONTENIDO PRINCIPAL --- */
    .main-content { margin-left: 280px; min-height: 100vh; transition: margin 0.3s ease; }
    .sticky-header {
      position: sticky; top: 0; background: var(--card-bg); z-index: 900;
      padding: 0.8rem 2rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }

    /* Estilos Hamburguesa */
    .menu-toggle {
      display: none; background: none; border: none;
      color: var(--text-dark); cursor: pointer; margin-right: 10px;
    }

    .timer-box { background: #fee2e2; color: #991b1b; padding: 8px 16px; border-radius: 8px; font-weight: 800; font-family: monospace; font-size: 1.2rem; }

    .btn {
      padding: 10px 18px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 8px; font-size: 0.85rem; transition: 0.2s;
    }
    .btn-grade { background: #059669; color: white; }
    .btn-pdf { background: #1e293b; color: white; display: none; }
    .btn-reload { background: #2563eb; color: white; }
    .btn-reset { background: #f1f5f9; color: #1e293b; border: 1px solid var(--border); }

    .exam-container { padding: 2rem; max-width: 900px; margin: 0 auto; }
    .question-card {
      background: var(--card-bg); border-radius: 16px; padding: 2rem; margin-bottom: 2rem;
      border: 1px solid var(--border); position: relative; overflow: hidden;
    }
    .option {
      padding: 15px; border: 2px solid var(--border); border-radius: 12px; cursor: pointer;
      margin-top: 10px; transition: 0.2s; display: flex; align-items: center; gap: 12px;
    }
    .option.selected { border-color: var(--primary); background: rgba(37,99,235,0.1); font-weight: 700; }
    .locked-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
    .ia-diagnostic { background: #eff6ff; border: 2px solid #bfdbfe; padding: 2rem; border-radius: 16px; margin-bottom: 2rem; display: none; color: #1e40af; }

    /* Overlay para móvil */
    #sidebar-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 1000;
    }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .menu-toggle { display: block; }
      #sidebar-overlay.active { display: block; }
      .btn span { display: none; } /* Oculta texto en botones para ahorrar espacio */
    }
  </style>
</head>
<body>

  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <div id="user-modal">
    <div class="modal-box">
      <i data-lucide="user-circle" style="width: 50px; height: 50px; color: var(--primary); margin-bottom: 1rem;"></i>
      <h2 id="modal-title">Configuración de Sesión</h2>
      
      <div id="welcome-back" style="display: none; margin: 1.5rem 0;">
        <p>Hola de nuevo, <strong id="logged-user-name" style="color:var(--primary)"></strong>.</p>
        <div style="display: grid; gap: 10px; margin-top: 1.5rem;">
          <button class="btn btn-grade" style="justify-content: center;" onclick="confirmUser(true)">Continuar sesión</button>
          <button class="btn btn-reset" style="justify-content: center;" onclick="showNewUserForm()">Cambiar de usuario</button>
        </div>
      </div>

      <div id="new-user-form">
        <input type="text" id="user-input" class="input-field" placeholder="Tu nombre completo...">
        <button class="btn btn-grade" style="width: 100%; justify-content: center;" onclick="confirmUser(false)">Iniciar Simulador</button>
      </div>
    </div>
  </div>

  <aside class="sidebar" id="sidebar">
    <a href="simuladores-ceta.html" class="sidebar-brand"><i data-lucide="graduation-cap"></i> CETA Los Naranjos - Regresar</a>
    <div class="menu-group">
      <div class="nav-link active"><i data-lucide="calculator"></i> Matemáticas</div>
    </div>
    <div style="margin-top: 2rem;">
      <button class="nav-link" style="background:none; border:none; width:100%" onclick="toggleDarkMode()">
        <i data-lucide="moon" id="dark-icon"></i> <span id="dark-text">Modo Oscuro</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="sticky-header">
      <div style="display: flex; gap: 10px; align-items: center;">
        <button class="menu-toggle" onclick="toggleSidebar()">
          <i data-lucide="menu"></i>
        </button>
        <button class="btn btn-reload" onclick="reloadSim()"><i data-lucide="refresh-cw"></i> <span>Recargar</span></button>
        <div>
          <h2 id="sim-title" style="font-size: 0.9rem; display: none;">Simulador</h2>
          <span id="student-name" style="font-size: 0.75rem; color: var(--sidebar-text);">...</span>
        </div>
      </div>
      <div class="timer-box" id="timer">75:00</div>
      <div style="display: flex; gap: 10px;">
        <button class="btn btn-grade" id="btn-grade" onclick="gradeExam()"><i data-lucide="check-circle"></i> <span>Calificar</span></button>
        <button class="btn btn-pdf" id="btn-pdf" onclick="generatePDF()"><i data-lucide="download"></i> <span>PDF</span></button>
      </div>
    </header>

    <div class="exam-container">
      <div id="ia-box" class="ia-diagnostic"></div>
      <div id="questions-wrapper"></div>
    </div>
  </main>

  <script>
    let studentName = "";
    let activeQuestions = [];
    const BANCO_GLOBAL = [];
    let timerInterval;

    // --- FUNCIÓN DEL MENÚ RESPONSIVE ---
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('active');
      document.getElementById('sidebar-overlay').classList.toggle('active');
    }

    // --- GENERADOR DE 550 EJERCICIOS ---
    function initBanco() {
        const tipos = ["Álgebra", "Geometría", "Trigonometría", "Lógica"];
        for(let i = 1; i <= 550; i++) {
            let val = i + 5;
            let tema = tipos[i % 4];
            let enunciado = "";
            let rpta = "";

            if(tema === "Álgebra") {
                enunciado = `Resuelva la siguiente expresión: ${val}x + ${val*2} = ${val*5}. ¿Cuál es el valor de x?`;
                rpta = "x = 3";
            } else if(tema === "Geometría") {
                enunciado = `Calcule el área de un triángulo cuya base es ${val}cm y su altura es ${val*2}cm.`;
                rpta = `${(val * val * 2) / 2} cm²`;
            } else if(tema === "Trigonometría") {
                enunciado = `Determine el valor de la hipotenusa en un triángulo rectángulo con catetos de ${val} y ${val+1}.`;
                rpta = Math.sqrt(Math.pow(val,2) + Math.pow(val+1,2)).toFixed(2);
            } else {
                enunciado = `En una sucesión aritmética, el primer término es ${val} y la razón es 5. ¿Cuál es el cuarto término?`;
                rpta = `${val + (3 * 5)}`;
            }

            let opts = [rpta, (val+10).toString(), (val-2).toString(), "Ninguna"].sort(() => 0.5 - Math.random());
            BANCO_GLOBAL.push({ tema, pregunta: enunciado, opciones: opts, correcta: opts.indexOf(rpta) });
        }
    }

    // --- USUARIO Y SESIÓN ---
    function checkUser() {
        const saved = localStorage.getItem('ceta_user');
        if(saved) {
            document.getElementById('logged-user-name').textContent = saved;
            document.getElementById('welcome-back').style.display = 'block';
            document.getElementById('new-user-form').style.display = 'none';
        }
    }

    function showNewUserForm() {
        document.getElementById('welcome-back').style.display = 'none';
        document.getElementById('new-user-form').style.display = 'block';
    }

    function confirmUser(keep) {
        if(!keep) {
            const val = document.getElementById('user-input').value.trim();
            if(!val) return alert("Ingresa tu nombre.");
            studentName = val;
            localStorage.setItem('ceta_user', val);
        } else {
            studentName = localStorage.getItem('ceta_user');
        }
        document.getElementById('student-name').textContent = `Estudiante: ${studentName}`;
        document.getElementById('user-modal').style.display = 'none';
        loadSim();
    }

    // --- LÓGICA DEL TEST ---
    function loadSim() {
        clearInterval(timerInterval);
        document.getElementById('btn-grade').style.display = 'flex';
        document.getElementById('btn-pdf').style.display = 'none';
        document.getElementById('ia-box').style.display = 'none';
        
        activeQuestions = [...BANCO_GLOBAL].sort(() => 0.5 - Math.random()).slice(0, 75).map(q => ({...q, userSelected: null}));
        
        const wrapper = document.getElementById('questions-wrapper');
        wrapper.innerHTML = activeQuestions.map((q, i) => `
            <div class="question-card" id="q-${i}">
                <div class="locked-overlay" id="lock-${i}"></div>
                <small style="color:var(--primary); font-weight:800;">${q.tema} | ÍTEM ${i+1}</small>
                <div class="question-text" style="margin-top:10px; font-weight:600;">${q.pregunta}</div>
                <div class="options-list">
                    ${q.opciones.map((opt, oi) => `
                        <div class="option" id="opt-${i}-${oi}" onclick="selectOpt(${i}, ${oi})">
                            <strong>${String.fromCharCode(65+oi)}</strong> ${opt}
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
        
        let time = 4500;
        timerInterval = setInterval(() => {
            time--;
            let m = Math.floor(time/60), s = time%60;
            document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(time <= 0) gradeExam();
        }, 1000);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function selectOpt(q, o) {
        activeQuestions[q].userSelected = o;
        document.querySelectorAll(`#q-${q} .option`).forEach(el => el.classList.remove('selected'));
        document.getElementById(`opt-${q}-${o}`).classList.add('selected');
    }

    function reloadSim() {
        if(confirm("¿Seguro que quieres recargar? Se generará un nuevo test.")) loadSim();
    }

    function gradeExam() {
        clearInterval(timerInterval);
        let score = 0;
        activeQuestions.forEach((q, i) => {
            document.getElementById(`lock-${i}`).style.display = 'block';
            if(q.userSelected === q.correcta) score++;
            document.getElementById(`q-${i}`).style.borderLeft = (q.userSelected === q.correcta) ? "6px solid #10b981" : "6px solid #ef4444";
        });
        const nota = ((score / 75) * 100).toFixed(2);
        document.getElementById('ia-box').style.display = 'block';
        document.getElementById('ia-box').innerHTML = `<h3>Resultado</h3><p>Puntaje: <strong>${nota}/100</strong></p>`;
        document.getElementById('btn-grade').style.display = 'none';
        document.getElementById('btn-pdf').style.display = 'flex';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("REPORTE CETA", 10, 10);
        doc.text(`Estudiante: ${studentName}`, 10, 20);
        const rows = activeQuestions.map((q, i) => [i+1, q.tema, q.userSelected === q.correcta ? 'OK' : 'X']);
        doc.autoTable({ head: [['#', 'Tema', 'Estado']], body: rows, startY: 30 });
        doc.save(`Resultado_${studentName}.pdf`);
    }

    function toggleDarkMode() { 
        document.body.classList.toggle('dark');
        lucide.createIcons();
    }

    window.onload = () => { initBanco(); checkUser(); lucide.createIcons(); };
  </script>
</body>
</html>
