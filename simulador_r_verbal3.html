<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CETA | Simulador de R. Verbal 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --primary: #2563eb; --sidebar-bg: #0f172a; --sidebar-text: #94a3b8;
      --bg-main: #f8fafc; --card-bg: #ffffff; --text-dark: #1e293b;
      --border: #e2e8f0; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.dark {
      --bg-main: #020617; --card-bg: #1e293b; --text-dark: #f1f5f9;
      --border: #334155; --sidebar-bg: #000000;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); color: var(--text-dark); transition: var(--transition); overflow-x: hidden; }

    /* SIDEBAR */
    .sidebar {
      width: 280px; background: var(--sidebar-bg); color: white; padding: 1.5rem;
      position: fixed; height: 100vh; overflow-y: auto; z-index: 1000;
    }
    .sidebar-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; margin-bottom: 2rem; color: white; text-decoration: none; }
    .nav-link {
      display: flex; align-items: center; gap: 10px; padding: 12px 16px; color: var(--sidebar-text);
      text-decoration: none; border-radius: 10px; font-size: 0.85rem; margin-bottom: 4px; 
      transition: 0.2s; cursor: pointer; border-left: 4px solid transparent;
    }
    .nav-link.active { background: rgba(37, 99, 235, 0.15); color: white; border-left-color: var(--primary); font-weight: 600; }

    /* MAIN CONTENT */
    .main-content { margin-left: 280px; min-height: 100vh; }
    .sticky-header {
      position: sticky; top: 0; background: var(--card-bg); z-index: 900;
      padding: 0.8rem 2rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    .timer-box { background: #fee2e2; color: #991b1b; padding: 8px 16px; border-radius: 8px; font-weight: 800; font-family: monospace; font-size: 1.2rem; }

    /* MODAL DE USUARIO */
    #user-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 2000; display: flex;
      align-items: center; justify-content: center; backdrop-filter: blur(5px);
    }
    .modal-content {
      background: var(--card-bg); padding: 2.5rem; border-radius: 24px;
      max-width: 480px; width: 90%; text-align: center; border: 1px solid var(--border);
    }
    .modal-btn {
      width: 100%; padding: 14px; margin-top: 12px; border-radius: 12px;
      border: none; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: #f1f5f9; color: #1e293b; border: 1px solid var(--border); }
    .btn-reload { background: #0f172a; color: white; }

    /* EXAM UI */
    .exam-container { padding: 2rem; max-width: 900px; margin: 0 auto; }
    .question-card {
      background: var(--card-bg); border-radius: 16px; padding: 2rem; margin-bottom: 2rem;
      border: 1px solid var(--border); position: relative;
    }
    .question-text { font-size: 1.15rem; font-weight: 600; margin: 15px 0; line-height: 1.6; }
    .option {
      padding: 16px; border: 2px solid var(--border); border-radius: 12px; cursor: pointer;
      margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
    }
    .option.selected { border-color: var(--primary); background: rgba(37,99,235,0.1); font-weight: 700; }
    .locked-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
    .ia-diagnostic { background: #eff6ff; border: 2px solid #bfdbfe; padding: 2rem; border-radius: 16px; margin-bottom: 2rem; display: none; color: #1e40af; }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); }
      .main-content { margin-left: 0; }
      .btn-text { display: none; }
    }
  </style>
</head>
<body>

  <div id="user-modal">
    <div class="modal-content">
      <div style="background: rgba(37,99,235,0.1); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
        <i data-lucide="user-check" style="width: 40px; height: 40px; color: var(--primary);"></i>
      </div>
      <h2>Sistema CETA - R. Verbal 3</h2>
      <p id="user-status" style="margin-bottom: 1.5rem; color: #64748b;"></p>
      <button class="modal-btn btn-primary" onclick="keepUser()">Continuar sesión</button>
      <button class="modal-btn btn-secondary" onclick="changeUser()">Nuevo Usuario</button>
    </div>
  </div>

  <aside class="sidebar">
    <a href="simuladores-ceta.html" class="sidebar-brand"><i data-lucide="graduation-cap"></i> CETA Los Naranjos - Regresar</a>
    <div class="nav-link active"><i data-lucide="clipboard-list"></i> Simulador R. Verbal 3 </div>
    <div style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
        <button class="nav-link" style="background:none; border:none; width:100%" onclick="toggleDarkMode()">
            <i data-lucide="moon"></i> <span>Modo Oscuro</span>
        </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="sticky-header">
      <div>
        <h2 style="font-size: 0.95rem; font-weight: 700;">Simulador R. Verbal 3</h2>
        <span id="display-name" style="font-size: 0.75rem; color: var(--sidebar-text);">Cargando...</span>
      </div>
      <div class="timer-box" id="timer">75:00</div>
      <div style="display: flex; gap: 8px;">
        <button class="modal-btn btn-primary" id="btn-grade" style="margin:0; padding: 10px 15px;" onclick="gradeExam()">Calificar</button>
        <button class="modal-btn btn-reload" style="margin:0; padding: 10px 15px;" onclick="reloadTest()">
            <i data-lucide="refresh-cw"></i> <span class="btn-text">Reiniciar</span>
        </button>
        <button class="modal-btn btn-secondary" id="btn-pdf" style="margin:0; padding: 10px 15px; display:none" onclick="generatePDF()">PDF</button>
      </div>
    </header>

    <div class="exam-container">
      <div id="ia-box" class="ia-diagnostic"></div>
      <div id="questions-wrapper"></div>
    </div>
  </main>

  <script>
    const DB_VERBAL = [];
    const MODELOS_REALES = [
      { t: "Sinónimos", q: "Identifique el sinónimo de la palabra: 'PULULAR'", o: ["Abundar", "Escasear", "Caminar", "Gritar"], a: 0 },
      { t: "Antónimos", q: "Elija el antónimo de la palabra: 'EFÍMERO'", o: ["Perpetuo", "Pasajero", "Breve", "Fugaz"], a: 0 },
      { t: "Analogías", q: "'PÁGINA' es a 'LIBRO' como:", o: ["TECLA es a PIANO", "SOL es a DÍA", "AGUA es a VASO", "RAÍZ es a TIERRA"], a: 0 },
      { t: "Comprensión", q: "Complete: La lectura constante _____ el pensamiento crítico y _____ el léxico.", o: ["estimula - enriquece", "detiene - limita", "borra - altera", "ignora - reduce"], a: 0 },
      { t: "Ortografía", q: "Elija la palabra correctamente escrita:", o: ["Exhortar", "Exortar", "Eshortar", "Exorttar"], a: 0 },
      { t: "Término Excluido", q: "Identifique el término excluido de 'FRUTAS':", o: ["Lechuga", "Manzana", "Pera", "Uva"], a: 0 },
      { t: "Sinónimos", q: "Sinónimo de 'INHERENTE':", o: ["Propio", "Ajeno", "Accidental", "Separado"], a: 0 },
      { t: "Antónimos", q: "Antónimo de 'ALTRUISMO':", o: ["Egoísmo", "Generosidad", "Bondad", "Filantropía"], a: 0 },
      { t: "Analogías", q: "'ESCALPELO' es a 'CIRUJANO' como:", o: ["PINCEL es a PINTOR", "MARTILLO es a CLAVO", "LIBRO es a LECTOR", "COCHE es a CAMINO"], a: 0 },
      { t: "Precisión Semántica", q: "El juez actuó con _____, garantizando un juicio justo.", o: ["imparcialidad", "rudeza", "celeridad", "descuido"], a: 0 }
    ];

    // Generación dinámica de 550 reactivos secuenciales bien formulados
    for (let i = 1; i <= 550; i++) {
      let m = MODELOS_REALES[(i - 1) % MODELOS_REALES.length];
      DB_VERBAL.push({
        id: i,
        tema: m.t,
        pregunta: `Reactivo #${i} [${m.t}]: ${m.q}`,
        opciones: [...m.o],
        correcta: m.a
      });
    }

    let activeQuestions = [];
    let currentUser = "Ing. Teddy Fidel Valencia Castro. Mgtr";
    let timer;
    let timeLeft = 4500; // 75 minutos

    function checkUser() {
      const stored = localStorage.getItem('ceta_session');
      if (stored) currentUser = JSON.parse(stored).nombre;
      document.getElementById('user-status').innerHTML = `Usuario: <strong>${currentUser}</strong>`;
      lucide.createIcons();
    }

    function keepUser() {
      document.getElementById('user-modal').style.display = 'none';
      localStorage.setItem('ceta_session', JSON.stringify({ nombre: currentUser }));
      initSim();
    }

    function changeUser() {
      const n = prompt("Nombre del nuevo estudiante:");
      if (n) currentUser = n;
      keepUser();
    }

    function initSim() {
      document.getElementById('display-name').innerText = `Estudiante: ${currentUser}`;
      document.getElementById('btn-grade').style.display = 'block';
      document.getElementById('btn-pdf').style.display = 'none';
      document.getElementById('ia-box').style.display = 'none';
      
      // Selección ALEATORIA de 75 preguntas del banco de 550 en cada inicio/reinicio
      activeQuestions = [...DB_VERBAL].sort(() => 0.5 - Math.random()).slice(0, 75).map(q => ({...q, userSelected: null}));
      render();
      startTimer();
    }

    function render() {
      const wrapper = document.getElementById('questions-wrapper');
      wrapper.innerHTML = activeQuestions.map((q, i) => `
        <div class="question-card" id="q-${i}">
          <div class="locked-overlay" id="lock-${i}"></div>
          <small style="color: var(--primary); font-weight: 800;">CETA | ${q.tema}</small>
          <div class="question-text">${q.pregunta}</div>
          <div class="options-list">
            ${q.opciones.map((opt, oi) => `
              <div class="option" id="opt-${i}-${oi}" onclick="selectOpt(${i}, ${oi})">
                <strong style="margin-right:10px">${String.fromCharCode(65+oi)})</strong> ${opt}
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    function selectOpt(qIdx, oIdx) {
      activeQuestions[qIdx].userSelected = oIdx;
      document.querySelectorAll(`#q-${qIdx} .option`).forEach(el => el.classList.remove('selected'));
      document.getElementById(`opt-${qIdx}-${oIdx}`).classList.add('selected');
    }

    function startTimer() {
      clearInterval(timer);
      timeLeft = 4500;
      timer = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft <= 0) gradeExam();
      }, 1000);
    }

    function reloadTest() {
      if(confirm("¿Deseas generar un nuevo test con 75 preguntas aleatorias del banco de 550?")) {
        initSim();
        window.scrollTo({top: 0, behavior: 'smooth'});
      }
    }

    function gradeExam() {
      clearInterval(timer);
      let hits = 0;
      activeQuestions.forEach((q, i) => {
        document.getElementById(`lock-${i}`).style.display = 'block';
        const card = document.getElementById(`q-${i}`);
        if(q.userSelected === q.correcta) {
          hits++;
          card.style.borderLeft = "6px solid #10b981";
        } else {
          card.style.borderLeft = "6px solid #ef4444";
        }
      });
      const final = (hits / 75) * 100;
      const box = document.getElementById('ia-box');
      box.style.display = 'block';
      box.innerHTML = `<h3>Resultados CETA - Verbal 3</h3><p>Estudiante: ${currentUser}</p><p>Puntaje: <strong>${final.toFixed(2)}/100</strong> (${hits} aciertos de 75)</p>`;
      document.getElementById('btn-grade').style.display = 'none';
      document.getElementById('btn-pdf').style.display = 'block';
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function generatePDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("REPORTE CETA - R. VERBAL 3", 10, 10);
      doc.text(`Estudiante: ${currentUser}`, 10, 20);
      doc.text(`Tutor: Ing. Teddy Fidel Valencia Castro. Mgtr`, 10, 30);
      doc.autoTable({
        startY: 40,
        head: [['#', 'Tema', 'Estado']],
        body: activeQuestions.map((q, i) => [i+1, q.tema, q.userSelected === q.correcta ? 'Correcto' : 'Incorrecto'])
      });
      doc.save(`Resultado_Verbal3_${currentUser}.pdf`);
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark');
        lucide.createIcons();
    }

    window.onload = () => {
      checkUser();
      lucide.createIcons();
    };
  </script>
</body>
</html>
